name: Deploy

on:
  push:
    branches: [main]

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy-web:
    name: Deploy Web
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 15
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # tailwind.config.ts laddas av jiti (CJS) → require-villkoret i @eken/ui
      # pekar på dist/cjs/tailwind-preset.js, som är gitignorerad. `vercel build`
      # kör bara appens egen build (tsc -b && vite build) och bygger aldrig
      # workspace-beroenden — samma skäl som apps/api/Dockerfile bygger @eken/ui först.
      - name: Build @eken/ui (CJS för tailwind-preset)
        run: pnpm --filter @eken/ui build

      - name: Check if deploy is needed
        id: turbo-ignore
        continue-on-error: true
        run: npx turbo-ignore @eken/web --task=build

      - name: Pull Vercel environment
        if: steps.turbo-ignore.outcome != 'success'
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build with Vercel
        if: steps.turbo-ignore.outcome != 'success'
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        if: steps.turbo-ignore.outcome != 'success'
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  deploy-admin:
    name: Deploy Admin
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 15
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_ADMIN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # Se kommentaren i deploy-web: admin importerar samma tailwind-preset.
      - name: Build @eken/ui (CJS för tailwind-preset)
        run: pnpm --filter @eken/ui build

      - name: Check if deploy is needed
        id: turbo-ignore
        continue-on-error: true
        run: npx turbo-ignore @eken/admin --task=build

      - name: Pull Vercel environment
        if: steps.turbo-ignore.outcome != 'success'
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build with Vercel
        if: steps.turbo-ignore.outcome != 'success'
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        if: steps.turbo-ignore.outcome != 'success'
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  deploy-portal:
    name: Deploy Portal
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 15
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PORTAL }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # Portalen saknar Tailwind och konsumerar bara @eken/ui/tokens.css (src),
      # så den klarar sig utan dist idag — steget finns för symmetri och för att
      # nästa @eken/ui-import inte ska falla i samma fälla.
      - name: Build @eken/ui (CJS för tailwind-preset)
        run: pnpm --filter @eken/ui build

      - name: Check if deploy is needed
        id: turbo-ignore
        continue-on-error: true
        run: npx turbo-ignore @eken/portal --task=build

      - name: Pull Vercel environment
        if: steps.turbo-ignore.outcome != 'success'
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build with Vercel
        if: steps.turbo-ignore.outcome != 'success'
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        if: steps.turbo-ignore.outcome != 'success'
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
