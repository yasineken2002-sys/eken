name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call: {}

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run typecheck
        run: pnpm exec turbo typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm exec turbo lint

  index-guard:
    name: Critical index guard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      # Rent statisk kontroll (fs-only, inga beroenden, ingen DB) — verifierar att
      # kritiska partiella index som bara lever i migrations-SQL (t.ex.
      # lease_unit_active_unique, som Prisma inte kan deklarera) inte tyst
      # DROP:ats/försvagats av en `prisma migrate dev`-drift. Se #59 / T5 Fas B2.
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify critical partial DB indexes survive migrations
        run: node apps/api/scripts/check-critical-indexes.mjs

  invoice-number-guard:
    name: Platform invoice-number source guard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      # Rent statisk kontroll (fs-only, inga beroenden, ingen DB) — säkerställer att
      # PlatformInvoice.invoiceNumber ENBART allokeras via den delade, race-säkra
      # allocatePlatformInvoiceNumber() (atomär sekvens i tx). Fångar en framtida
      # kringgång (create/createMany/upsert utan allokerare, update som omnumrerar,
      # rå SQL) innan racet återuppstår. Se T5 FAR-uppföljning.
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Self-test the guard (good passes, bypass variants caught)
        run: node apps/api/scripts/check-platform-invoice-number-source.mjs --self-test

      - name: Verify invoice-number is only sourced from the shared sequence
        run: node apps/api/scripts/check-platform-invoice-number-source.mjs

  design-token-guard:
    name: Design token guard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      # Rent statisk kontroll (fs-only, inga beroenden) — spärr mot att nya rå
      # färgvärden smyger in utanför @eken/ui och blir ytor som färgflippen inte
      # når. Täcker hex, Tailwind-arbitrary (`bg-[#…]`) och rgb()/hsl(), i både
      # CSS/CSS Modules och TS/TSX. Tre lager:
      #   • hårt      — @eken/ui:s låsta målvärden och HELT NYA färger faller
      #                 alltid; varumärkesfärgen ska komma ur en token eller
      #                 DEFAULT_BRAND_COLOR.
      #   • allowlist — flipp-skulden i scripts/design-tokens.baseline.json. Varje
      #                 post pekar på en kategori med why + flip. Ratchet: fler
      #                 träffar fäller, färre snävar åt. Ska nå noll vid flippen.
      #   • inline    — `design-tokens-allow: <varför>` för färger som ALDRIG ska
      #                 tokeniseras (kunddata, falska positiver).
      # Kör även i `pnpm lint`; detta är den blockerande grinden. Se ADR:n (PR7).
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Self-test the guard (detection, comment stripping, allowlist)
        run: node scripts/check-design-tokens.mjs --self-test

      - name: Verify no new raw colour values outside @eken/ui
        run: node scripts/check-design-tokens.mjs
